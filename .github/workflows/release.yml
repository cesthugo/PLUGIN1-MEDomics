name: Release STARHE (multi-platform)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build artifacts but do not create a GitHub release"
        required: false
        default: 'false'

permissions:
  contents: write

env:
  PYTHON_VERSION: '3.13'
  NODE_VERSION: '22'
  GO_VERSION: '1.22'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # Create the draft release ONCE (before the matrix) so the 4 build jobs don't
  # each race to `gh release create` and produce duplicate empty drafts.
  prepare_release:
    name: Prepare draft release
    runs-on: ubuntu-latest
    steps:
      - name: Create draft release (tag push only)
        if: startsWith(github.ref, 'refs/tags/v') && github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF_NAME}"
          gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 \
            || gh release create "$tag" --repo "$GITHUB_REPOSITORY" \
                 --draft --title "STARHE $tag" --generate-notes

  build:
    name: Build (${{ matrix.platform }})
    needs: prepare_release
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: mac-arm64
            eb_flags: '--mac --arm64'
            go_bin: go_server
            jre_script: scripts/fetch_jre.sh
            jre_arg: mac-arm64
          - os: macos-13
            platform: mac-x64
            eb_flags: '--mac --x64'
            go_bin: go_server
            jre_script: scripts/fetch_jre.sh
            jre_arg: mac-x64
          - os: ubuntu-latest
            platform: linux-x64
            eb_flags: '--linux --x64'
            go_bin: go_server
            jre_script: scripts/fetch_jre.sh
            jre_arg: linux-x64
          - os: windows-latest
            platform: win-x64
            eb_flags: '--win --x64'
            go_bin: go_server.exe
            jre_script: scripts/fetch_jre.ps1
            jre_arg: win-x64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: renderer/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: pythonCode/modules/starhe_plugin/requirements.txt

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go_server/go.sum

      # ── Linux only: free up disk space (~25 GB) before the big downloads ──
      - name: Free disk space (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo rm -rf /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL \
                      /usr/share/dotnet /usr/local/share/boost
          df -h

      # ── Linux only: system dependencies for electron-builder (deb/AppImage) ──
      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            fakeroot dpkg rpm libarchive-tools

      # ── Step 1: build the Go server ───────────────────────────────────────────
      - name: Build Go server
        working-directory: go_server
        shell: bash
        run: |
          go build -trimpath -ldflags "-s -w" -o ${{ matrix.go_bin }} .
          ls -la ${{ matrix.go_bin }}

      # electron-builder's extraResources bundles the Go binary from
      # renderer/build-resources/go-server/. Stage the freshly-built binary there
      # so the package always ships the current code (not a stale committed one).
      - name: Stage Go binary into build-resources
        shell: bash
        run: |
          set -eux
          dest="renderer/build-resources/go-server/go-server-${{ matrix.platform }}"
          [ "${{ matrix.go_bin }}" = "go_server.exe" ] && dest="${dest}.exe"
          mkdir -p "$(dirname "$dest")"
          cp "go_server/${{ matrix.go_bin }}" "$dest"
          ls -la "$dest"

      # ── Step 2: install Python deps + PyInstaller ────────────────────────────
      # On Linux, force torch CPU-only (~200 MB) instead of the default CUDA+CPU
      # wheel (~2.5 GB), which drastically reduces the PyInstaller time.
      # The Ubuntu runners have no GPU; the Linux bundle will be CPU-only.
      - name: Install Python dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip wheel
          python -m pip install pyinstaller==6.20.0
          if [ "$RUNNER_OS" = "Linux" ]; then
            python -m pip install torch==2.11.0 torchvision==0.26.0 \
              --index-url https://download.pytorch.org/whl/cpu
          fi
          python -m pip install -r pythonCode/modules/starhe_plugin/requirements.txt
          # Vendored prepUS + mmaction2 (C3D backend) — installed SEPARATELY, like
          # scripts/setup.sh (they are not in requirements.txt). Without them the
          # bundled worker crashes at runtime: prepUS preprocessing (step 4) and
          # C3D inference (mmaction2 backend) fail with ModuleNotFoundError.
          python -m pip install ./third_party/prepUS --no-deps
          python -m pip install mmaction2==1.2.0 --no-deps
          python scripts/patch_mmaction.py

      # ── Step 3: bundle the Python worker ─────────────────────────────────────
      - name: Cache PyInstaller worker bundle
        id: cache-pyinstaller
        uses: actions/cache@v4
        with:
          path: pythonCode/modules/dist
          # cache epoch v2: bump to invalidate stale bundles that predate the
          # prepUS + mmaction2 install fix.
          key: pyinstaller-v2-${{ matrix.platform }}-py${{ env.PYTHON_VERSION }}-${{ hashFiles('pythonCode/modules/starhe_plugin/requirements.txt', 'scripts/starhe_worker.spec', 'scripts/patch_mmaction.py', 'pythonCode/modules/starhe_plugin/**/*.py') }}

      - name: Build PyInstaller worker
        if: steps.cache-pyinstaller.outputs.cache-hit != 'true'
        working-directory: pythonCode/modules
        shell: bash
        run: |
          rm -rf build dist
          pyinstaller ../../scripts/starhe_worker.spec --noconfirm
          ls dist/starhe_worker | head -20

      # electron-builder's extraResources bundles the worker from
      # renderer/build-resources/starhe_worker/. PyInstaller wrote it to
      # pythonCode/modules/dist/ — stage it there (runs on cache-hit too, since
      # the cache restores dist/). Without this the installer ships with NO
      # worker and DICOM loading fails ("starhe_worker not found").
      - name: Stage PyInstaller worker into build-resources
        shell: bash
        run: |
          set -eux
          src=pythonCode/modules/dist/starhe_worker
          dst=renderer/build-resources/starhe_worker
          rm -rf "$dst"
          mkdir -p "$(dirname "$dst")"
          cp -R "$src" "$dst"
          ls "$dst" | head -5

      # ── Step 4: download the Temurin JRE for the platform ────────────────────
      - name: Fetch JRE (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: bash ${{ matrix.jre_script }} ${{ matrix.jre_arg }}

      - name: Fetch JRE (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\${{ matrix.jre_script }} -Platform ${{ matrix.jre_arg }}

      # ── Step 5: install + build the Electron app ─────────────────────────────
      - name: Install npm dependencies
        working-directory: renderer
        run: npm ci

      # `third_party/weasis-dcm2png/dist/` is gitignored (global `dist/` rule)
      # but referenced by `extraResources`. Rebuild it from `target/`
      # (committed Maven artifacts) before each electron-builder build.
      - name: Prepare weasis-dcm2png (dist + build-resources)
        shell: bash
        run: |
          set -eux
          src=third_party/weasis-dcm2png/target
          dst=third_party/weasis-dcm2png/dist
          mkdir -p "$dst/native"
          cp "$src/weasis-dcm2png.jar" "$dst/"
          if [ -d "$src/native" ]; then
            cp -R "$src/native/." "$dst/native/"
          fi
          ls -la "$dst" "$dst/native"
          # Stage into build-resources where electron-builder's extraResources
          # looks (from: build-resources/weasis-dcm2png). Otherwise the installer
          # ships without weasis and silently falls back to pydicom.
          br=renderer/build-resources/weasis-dcm2png
          rm -rf "$br"
          cp -R "$dst" "$br"
          ls -la "$br"

      - name: Build renderer + Electron main
        working-directory: renderer
        run: npm run build:electron

      - name: Run electron-builder
        working-directory: renderer
        env:
          # Prevents electron-builder from trying to sign/notarize without certificates.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          # Token for the possible download of Electron binaries behind a proxy.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          npx electron-builder ${{ matrix.eb_flags }} --publish never

      # ── Step 6: upload the artifacts (without the internal blockmaps) ────────
      - name: Collect artifacts
        id: collect
        shell: bash
        run: |
          mkdir -p dist-artifacts
          cd renderer/release
          # Keep only the final installers/distributables.
          shopt -s nullglob
          for f in *.dmg *.pkg *.zip *.deb *.AppImage *.exe; do
            cp "$f" ../../dist-artifacts/
          done
          cd ../..
          ls -la dist-artifacts/

      # Publish installers DIRECTLY as GitHub Release assets. Release assets are
      # exempt from the Actions artifact-storage quota (500 MB shared on the free
      # tier), so this avoids the "Artifact storage quota has been hit" failure
      # that blocks actions/upload-artifact once the account quota is full.
      - name: Upload installers to draft release
        if: startsWith(github.ref, 'refs/tags/v') && github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -eux
          tag="${GITHUB_REF_NAME}"
          # The draft release was already created by the prepare_release job, so
          # every matrix job just appends its installer(s). --clobber makes re-runs
          # overwrite same-named assets instead of failing.
          gh release upload "$tag" --repo "$GITHUB_REPOSITORY" --clobber dist-artifacts/*

  # ── Final job: compute SHA256SUMS from the published release assets ──────────
  release:
    name: Finalize GitHub Release (SHA256SUMS)
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') && github.event_name == 'push'
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Download release assets and compute SHA256SUMS.txt
        shell: bash
        run: |
          set -eux
          tag="${GITHUB_REF_NAME}"
          mkdir assets && cd assets
          # Pull every installer the build jobs published to the draft release.
          gh release download "$tag" --repo "$GITHUB_REPOSITORY" --pattern '*' || true
          rm -f SHA256SUMS.txt
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt
          gh release upload "$tag" --repo "$GITHUB_REPOSITORY" --clobber SHA256SUMS.txt
