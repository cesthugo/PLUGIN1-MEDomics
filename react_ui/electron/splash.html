<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <title>STARHE — Démarrage</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background: #0c1018;
      color: #e6edf3;
      font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }
    .wrap {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
    }
    .title { font-size: 28px; font-weight: 600; letter-spacing: 1px; }
    .subtitle { font-size: 13px; color: #8b949e; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #30363d;
      border-top-color: #58a6ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .footer {
      position: absolute;
      bottom: 12px;
      font-size: 10px;
      color: #6e7681;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="title">STARHE</div>
    <div class="spinner"></div>
    <div class="subtitle">Démarrage du serveur Go…</div>
  </div>
  <div class="footer">MEDomics-UdeS · plugin DICOM hépatique</div>
</body>
</html>
