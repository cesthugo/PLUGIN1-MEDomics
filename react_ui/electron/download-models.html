<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'" />
  <title>STARHE — Téléchargement des modèles</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0c1018;
      color: #e6e6e6;
      overflow: hidden;
      user-select: none;
      -webkit-app-region: drag;
    }
    .wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      padding: 40px 50px;
      text-align: center;
    }
    h1 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 6px;
      letter-spacing: 0.5px;
    }
    .subtitle {
      font-size: 13px;
      color: #8a93a6;
      margin-bottom: 28px;
    }
    .progress {
      width: 100%;
      height: 8px;
      background: #1a2030;
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 12px;
    }
    .bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #4a8df0, #6ba9ff);
      transition: width 200ms ease-out;
    }
    .status {
      font-size: 12px;
      color: #b3bcce;
      min-height: 18px;
      margin-bottom: 6px;
      font-variant-numeric: tabular-nums;
    }
    .detail {
      font-size: 11px;
      color: #6a7385;
      min-height: 16px;
      font-variant-numeric: tabular-nums;
    }
    .error {
      color: #ff7070;
      margin-top: 16px;
      font-size: 12px;
      max-width: 100%;
      word-wrap: break-word;
    }
    .actions {
      margin-top: 20px;
      display: none;
    }
    .actions.show { display: block; }
    button {
      -webkit-app-region: no-drag;
      background: #4a8df0;
      color: white;
      border: none;
      padding: 8px 18px;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
      margin: 0 4px;
    }
    button:hover { background: #5a9df9; }
    button.secondary { background: #2a3548; }
    button.secondary:hover { background: #3a4558; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>STARHE</h1>
    <div class="subtitle">Téléchargement des modèles d'IA (premier lancement)</div>

    <div class="progress"><div class="bar" id="bar"></div></div>
    <div class="status" id="status">Préparation…</div>
    <div class="detail" id="detail"></div>

    <div class="error" id="error"></div>

    <div class="actions" id="actions">
      <button onclick="window.starheDownload.retry()">Réessayer</button>
      <button class="secondary" onclick="window.starheDownload.quit()">Quitter</button>
    </div>
  </div>

  <script>
    const bar    = document.getElementById('bar');
    const status = document.getElementById('status');
    const detail = document.getElementById('detail');
    const error  = document.getElementById('error');
    const actions = document.getElementById('actions');

    function fmtMB(bytes) {
      return (bytes / 1024 / 1024).toFixed(0);
    }

    window.starheDownload.onProgress((evt) => {
      // evt = { phase, file, current, total, bytesDone, bytesTotal, message }
      if (evt.phase === 'error') {
        error.textContent = evt.message || 'Erreur de téléchargement';
        actions.classList.add('show');
        return;
      }
      error.textContent = '';
      actions.classList.remove('show');

      if (evt.phase === 'done') {
        bar.style.width = '100%';
        status.textContent = 'Téléchargement terminé. Démarrage…';
        detail.textContent = '';
        return;
      }

      const fileLabel = evt.file ? `${evt.file} (${evt.current}/${evt.total})` : '';
      status.textContent = fileLabel || evt.message || 'Téléchargement…';

      if (evt.bytesTotal > 0) {
        const pct = (evt.bytesDone / evt.bytesTotal) * 100;
        bar.style.width = pct.toFixed(1) + '%';
        detail.textContent = `${fmtMB(evt.bytesDone)} / ${fmtMB(evt.bytesTotal)} MB  ·  ${pct.toFixed(1)} %`;
      } else {
        detail.textContent = '';
      }
    });
  </script>
</body>
</html>
